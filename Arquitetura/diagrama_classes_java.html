
<style>
#uml-wrap { padding: 16px 0; }
#uml { width: 100%; overflow-x: auto; }
#uml svg { max-width: 100%; height: auto; }
.legend { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 12px; font-size: 12px; color: var(--color-text-secondary); }
.leg-item { display: flex; align-items: center; gap: 6px; }
.leg-line { width: 28px; height: 2px; }
.leg-dashed { border-top: 2px dashed var(--color-text-secondary); }
.leg-solid  { border-top: 2px solid var(--color-text-secondary); }
.leg-comp   { border-top: 3px solid #3B8BD4; }
</style>
<div id="uml-wrap">
  <div id="uml"></div>
  <div class="legend">
    <span style="font-weight:500;color:var(--color-text-primary)">Legenda:</span>
    <div class="leg-item"><div class="leg-solid leg-line"></div><span>Associação / uso direto</span></div>
    <div class="leg-item"><div class="leg-dashed leg-line"></div><span>Dependência (usa pontualmente)</span></div>
    <div class="leg-item"><div class="leg-comp leg-line"></div><span>Composição (contém)</span></div>
  </div>
</div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    classText: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2840' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
    secondaryColor: dark ? '#083428' : '#E1F5EE',
    secondaryBorderColor: dark ? '#0F6E56' : '#0F6E56',
    secondaryTextColor: dark ? '#9FE1CB' : '#04342C',
    tertiaryColor: dark ? '#2e1a10' : '#FAECE7',
    tertiaryBorderColor: dark ? '#993C1D' : '#993C1D',
    tertiaryTextColor: dark ? '#F0997B' : '#4A1B0C',
    noteBkgColor: dark ? '#1a2030' : '#E6F1FB',
    noteTextColor: dark ? '#85B7EB' : '#042C53',
  }
});

const diagram = `classDiagram
  direction TB

  namespace Model {
    class Usuario {
      -int id
      -String nome
      -String sobrenome
      -String login
      -String senha
      +getId() int
      +getNome() String
      +getSobrenome() String
      +getLogin() String
      +getSenha() String
      +setNome(String) void
      +setLogin(String) void
      +setSenha(String) void
    }

    class Admin {
      -int id
      -String login
      -String senha
      +getId() int
      +getLogin() String
      +getSenha() String
    }

    class Produto {
      -int id
      -String nome
      -String descricao
      -double preco
      -int estoque
      +getId() int
      +getNome() String
      +getDescricao() String
      +getPreco() double
      +getEstoque() int
    }

    class ItemCarrinho {
      -Produto produto
      -int quantidade
      +getProduto() Produto
      +getQuantidade() int
      +setQuantidade(int) void
    }

    class Carrinho {
      -Usuario usuario
      -List~ItemCarrinho~ itens
      +adicionarItem(ItemCarrinho) void
      +removerItem(Produto) void
      +getItens() List~ItemCarrinho~
      +getUsuario() Usuario
      +limpar() void
    }
  }

  namespace DAO {
    class UsuarioDAO {
      +cadastrar(Usuario) void
      +buscarPorLogin(String) Usuario
      +loginExiste(String) boolean
      +validarSenha(String, String) boolean
    }

    class AdminDAO {
      +buscarPorLogin(String) Admin
      +validarSenha(String, String) boolean
    }

    class ProdutoDAO {
      +cadastrar(Produto) void
      +buscarPorId(int) Produto
      +buscarPorNome(String) List~Produto~
      +remover(int) void
      +atualizar(Produto) void
    }
  }

  namespace Conexao {
    class ConnectionFactory {
      -String URL
      -String USER
      -String PASS
      +getConnection()$ Connection
    }
  }

  namespace View {
    class MenuPrincipal {
      +exibir() void
    }

    class MenuCadastro {
      -UsuarioDAO usuarioDAO
      +exibir() void
      -validarSenhas(String, String) boolean
      -validarCampos(String) boolean
    }

    class MenuLogin {
      -UsuarioDAO usuarioDAO
      -AdminDAO adminDAO
      +exibirLoginUsuario() void
      +exibirLoginAdmin() void
    }

    class TelaCliente {
      -Usuario usuario
      -Carrinho carrinho
      -ProdutoDAO produtoDAO
      +exibir() void
      +buscarProduto() void
      +adicionarAoCarrinho() void
      +removerDoCarrinho() void
      +confirmarCompra() void
    }

    class TelaAdministrativa {
      -ProdutoDAO produtoDAO
      +exibir() void
      +cadastrarProduto() void
      +buscarProduto() void
      +removerProduto() void
      +atualizarProduto() void
    }
  }

  Carrinho "1" *-- "0..*" ItemCarrinho : contém
  ItemCarrinho --> Produto : referencia
  Carrinho --> Usuario : pertence a

  UsuarioDAO ..> ConnectionFactory : usa
  AdminDAO ..> ConnectionFactory : usa
  ProdutoDAO ..> ConnectionFactory : usa

  UsuarioDAO ..> Usuario : cria/retorna
  AdminDAO ..> Admin : cria/retorna
  ProdutoDAO ..> Produto : cria/retorna

  MenuPrincipal --> MenuCadastro : chama
  MenuPrincipal --> MenuLogin : chama
  MenuCadastro --> UsuarioDAO : usa
  MenuLogin --> UsuarioDAO : usa
  MenuLogin --> AdminDAO : usa
  MenuLogin --> TelaCliente : redireciona
  MenuLogin --> TelaAdministrativa : redireciona
  TelaCliente --> ProdutoDAO : usa
  TelaCliente --> Carrinho : gerencia
  TelaAdministrativa --> ProdutoDAO : usa
`;

try {
  const { svg } = await mermaid.render('uml-svg', diagram);
  document.getElementById('uml').innerHTML = svg;

  document.querySelectorAll('#uml svg .node').forEach(node => {
    const firstPath = node.querySelector('path[d]');
    if (!firstPath) return;
    const d = firstPath.getAttribute('d');
    const nums = d.match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0], nums[2], nums[4], nums[6]];
    const ys = [nums[1], nums[3], nums[5], nums[7]];
    const x = Math.min(...xs), y = Math.min(...ys);
    const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', w); rect.setAttribute('height', h);
    rect.setAttribute('rx', '8');
    for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
      if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
    }
    firstPath.replaceWith(rect);
  });
} catch(e) {
  document.getElementById('uml').innerHTML = '<p style="color:var(--color-text-secondary);padding:16px">Erro ao renderizar o diagrama.</p>';
  console.error(e);
}
</script>
